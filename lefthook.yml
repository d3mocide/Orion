pre-commit:
  parallel: true
  commands:
    lint:
      glob: "frontend/src/**/*.{ts,tsx}"
      run: npx.cmd --prefix frontend eslint --config frontend/eslint.config.js --no-warn-ignored {staged_files}
    format:
      glob: "frontend/src/**/*.{ts,tsx,css}"
      run: npx.cmd --prefix frontend prettier --check {staged_files}
    typecheck:
      root: "frontend/"
      run: npm.cmd run typecheck
