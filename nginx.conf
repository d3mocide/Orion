proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=celestrak_cache:10m max_size=1g inactive=24h use_temp_path=off;

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/wasm;
    gzip_min_length 1024;

    # Cache hashed bundles + textures aggressively
    location ~* \.(wasm|js|css|jpg|png|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy SatNOGS requests to bypass CORS restrictions
    location /api/satnogs/ {
        proxy_pass https://db.satnogs.org/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host db.satnogs.org;
    }

    # Proxy CelesTrak requests with server-side caching (2h duration)
    location /api/celestrak {
        proxy_cache celestrak_cache;
        proxy_cache_valid 200 2h;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_background_update on;
        add_header X-Cache-Status $upstream_cache_status;

        proxy_pass https://celestrak.org/NORAD/elements/gp.php;
        proxy_ssl_server_name on;
        proxy_set_header Host celestrak.org;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
